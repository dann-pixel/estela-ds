<mat-sidenav-container class="app-container">

  <!-- ── Sidebar ── -->
  <mat-sidenav
    #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile()"
    class="app-sidenav"
  >

    <!-- Logo -->
    <div class="sidenav-header">
      <span class="logo-mark">✦</span>
      <div class="logo-text">
        <span class="logo-name">Estela</span>
        <span class="logo-subtitle">Design System</span>
      </div>
    </div>

    <mat-divider />

    <!-- Navigation -->
    <mat-nav-list class="nav-list">
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
          class="nav-item"
          (click)="closeIfMobile()"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <!-- Footer -->
    <div class="sidenav-footer">
      <span>v0.0.1 · Angular Material v19</span>
    </div>

  </mat-sidenav>

  <!-- ── Content ── -->
  <mat-sidenav-content class="app-content">

    <!-- Toolbar mobile — solo visible en pantallas pequeñas -->
    @if (isMobile()) {
      <mat-toolbar class="mobile-toolbar">
        <button mat-icon-button (click)="sidenav.toggle()" aria-label="Abrir menú">
          <mat-icon>menu</mat-icon>
        </button>
        <span class="mobile-logo-mark">✦</span>
        <span class="mobile-logo-name">Estela</span>
      </mat-toolbar>
    }

    <router-outlet />

  </mat-sidenav-content>

</mat-sidenav-container>
